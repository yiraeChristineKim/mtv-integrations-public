sonar.projectKey=open-cluster-management_mtv-integrations
sonar.organization=open-cluster-management
sonar.projectName=mtv-integrations

# Source code paths
sonar.sources=.
sonar.exclusions=**/vendor/**,**/bin/**,**/*.pb.go,**/test/resources/**,**/hack/**,**/*.md,**/*.yaml,**/*.yml,**/*.json,**/test/utils/**,**/cmd/main.go

# Test configuration
sonar.tests=test/,controllers/
sonar.test.inclusions=**/*_test.go
sonar.test.exclusions=**/vendor/**

# Coverage configuration
# coverage.out = generated by Prow's build-harness sonar/go/prow target (go test -coverprofile=coverage.out)
# coverage_unit.out + others = generated by GitHub Actions test jobs and consolidated via the sonarcloud job
sonar.go.coverage.reportPaths=coverage.out,coverage_unit.out,coverage_e2e_main.out,coverage_provider_crd.out,coverage_advisor.out

# Test report paths
# report.json = generated by Prow's build-harness; report_unit.json + others = generated by GitHub Actions
sonar.go.tests.reportPaths=report.json,report_unit.json,report_e2e_main.json,report_provider_crd.json,report_advisor.json,report_webhook.json
