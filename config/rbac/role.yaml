apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: mtv-integrations
    app.kubernetes.io/managed-by: kustomize
  name: manager-role
rules:
- apiGroups: ["cluster.open-cluster-management.io"]
  resources: ["managedclusters"]
  verbs: ["get", "list", "watch", "patch", "update"]
- apiGroups: ["authentication.open-cluster-management.io"]
  resources: ["managedserviceaccounts"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["rbac.open-cluster-management.io"]
  resources: ["clusterpermissions"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Secrets: MSA token secret + provider credentials.
# Namespaces: create the mtv-integrations namespace per managed cluster.
- apiGroups: [""]
  resources: ["secrets", "namespaces"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Services: read cluster-proxy-addon-user to discover the cluster-proxy host.
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch"]
# ConfigMaps: read openshift-service-ca.crt to verify cluster-proxy TLS.
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["forklift.konveyor.io"]
  resources: ["providers"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["users", "groups", "serviceaccounts", "uids"]
  verbs: ["impersonate"]
- apiGroups: ["user.openshift.io"]
  resources: ["users", "groups"]
  verbs: ["impersonate"]
- apiGroups: ["authentication.k8s.io"]
  resources: ["uids"]
  verbs: ["impersonate"]
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions", "customresourcedefinitions/status"]
  verbs: ["get", "list", "watch"]
# Deployments: list all to locate the managed-serviceaccount-addon-agent namespace.
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]
# Routes: read cluster-proxy Route spec.host when DEV_MODE=true.
- apiGroups: ["route.openshift.io"]
  resources: ["routes"]
  verbs: ["get"]
